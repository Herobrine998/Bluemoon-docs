name: Update Google Docs

on:
  push:
    branches: [ main ]

jobs:
  update-doc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install Python deps
        run: pip install pyjwt requests

      - name: Convert md to docx
        run: pandoc Law.md -o output.docx --reference-doc=reference.docx

      - name: Write service account key
        run: echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}' > key.json

      - name: Get token
        id: auth
        run: |
          TOKEN=$(python3 .github/scripts/auth.py)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Upload to Google Docs
        run: |
          curl -X PATCH \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "metadata={mimeType:'application/vnd.google-apps.document'};type=application/json" \
            -F "file=@output.docx" \
            "https://www.googleapis.com/upload/drive/v3/files/182N97GCVkAEQXoh4kl3QowXvwQ8wAZz6sj2M297-fHo?uploadType=multipart"
